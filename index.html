<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Books | The Royal Archive</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary-gold: #ffd700;
        --royal-black: #0a0a0a;
        --parchment: #f4e4bc;
        --bg-color: #0a0a0a;
        --text-color: #e5e7eb;
    }

    .light-mode {
        --bg-color: #f9fafb;
        --text-color: #111827;
        --royal-black: #ffffff;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: background 0.3s, color 0.3s;
        -webkit-user-select: none;
        user-select: none;
    }

    .royal-font { font-family: 'Cinzel', serif; }

    .gold-gradient-text {
        background: linear-gradient(135deg, #ffd700, #f8b400, #ffcc33);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .book-card {
        transition: all 0.4s ease;
        border: 1px solid #2d2d2d;
        background: rgba(20, 20, 20, 0.8);
    }

    .book-card:hover {
        transform: translateY(-10px);
        border-color: var(--primary-gold);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .premium-button {
        background: linear-gradient(to right, #ffd700, #b8860b);
        color: black;
        font-weight: bold;
        transition: 0.3s;
    }

    /* Reading Room - Parchment Style */
    #reading-room {
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        color: #2b1e16;
        line-height: 1.8;
        font-family: 'Georgia', serif;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.1), 0 20px 50px rgba(0,0,0,0.8);
    }

    .modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95);
        display: none; justify-content: center; align-items: center; z-index: 1000;
    }

    .checkout-input {
        background-color: #1a1a1a;
        border: 1px solid #333;
        color: white;
        padding: 0.75rem;
        border-radius: 0.5rem;
        width: 100%;
    }
</style>
</head>
<body oncontextmenu="return false;">

<header class="bg-black/90 sticky top-0 z-50 border-b border-yellow-900">
  <div class="container mx-auto px-4 py-4 flex justify-between items-center">
    <a href="#" class="text-2xl md:text-3xl font-black gold-gradient-text tracking-widest royal-font">KING BOOKS</a>
    
    <div class="flex items-center space-x-4">
        <button id="theme-toggle" class="text-yellow-500 text-xl p-2">🌞/🌙</button>
        <div id="user-avatar" class="hidden w-10 h-10 rounded-full bg-yellow-600 flex items-center justify-center font-bold text-black cursor-pointer"></div>
        <button id="sign-btn" onclick="openAuth()" class="premium-button px-4 py-2 rounded-full text-xs md:text-sm">LOGIN</button>
    </div>
  </div>
</header>

<section class="py-20 text-center bg-[url('https://www.transparenttextures.com/patterns/dark-leather.png')]">
    <h1 class="text-5xl md:text-7xl font-black gold-gradient-text mb-4 royal-font">THE ROYAL ARCHIVE</h1>
    <p class="text-xl text-gray-400 mb-8 italic">Next Manuscript Drop In:</p>
    <div id="drop-timer" class="text-4xl font-bold text-yellow-500 tracking-tighter mb-10">00d 00h 00m 00s</div>
    <a href="#library" class="premium-button py-4 px-10 rounded-full uppercase tracking-widest">Enter Library</a>
</section>

<section id="library" class="py-20 container mx-auto px-4">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="book-card p-6 rounded-xl text-center">
            <img src="https://images.unsplash.com/photo-1543005128-d64e403987d3?w=500" class="w-full h-80 object-cover rounded-lg mb-6 shadow-2xl">
            <h3 class="text-2xl font-bold text-yellow-500 mb-2 royal-font">The Pharaoh's Legacy</h3>
            <p class="text-gray-500 mb-4">Price: <span class="price-tag" data-egp="500">EGP 500</span></p>
            <div class="flex gap-2">
                <button onclick="openBook('The Pharaoh\'s Legacy', 'The sands of Egypt hide many secrets...')" class="flex-1 bg-zinc-800 py-3 rounded-lg hover:bg-zinc-700 transition">Read Preview</button>
                <button onclick="openCheckout('The Pharaoh\'s Legacy', 500)" class="flex-1 premium-button py-3 rounded-lg">Buy Access</button>
            </div>
        </div>
        </div>
</section>

<div id="book-modal" class="modal-overlay">
    <div class="max-w-4xl mx-auto my-10 relative px-4 w-full">
        <button onclick="closeBook()" class="fixed top-5 right-5 text-white text-4xl">&times;</button>
        <div id="reading-room" class="p-10 md:p-20 rounded shadow-2xl min-h-screen">
            <h1 id="book-title" class="text-4xl font-black mb-10 border-b border-yellow-900 pb-4 royal-font"></h1>
            <div id="book-content" class="text-xl text-justify leading-relaxed"></div>
        </div>
    </div>
</div>

<div id="checkout-modal" class="modal-overlay">
    <div class="bg-zinc-900 p-8 rounded-2xl border-2 border-yellow-600 max-w-md w-full relative">
        <button onclick="closeModals()" class="absolute top-4 right-4 text-white text-2xl">&times;</button>
        <h2 class="text-2xl font-bold gold-gradient-text mb-6 royal-font">Quick Checkout</h2>
        <div class="mb-4 text-gray-400">Buying: <span id="checkout-item-name" class="text-yellow-500 font-bold"></span></div>
        <form onsubmit="processPayment(event)">
            <input type="text" placeholder="Full Name" required class="checkout-input mb-4">
            <input type="email" placeholder="Email for Delivery" required class="checkout-input mb-4">
            <div class="text-xs text-red-400 mb-4 italic">Redirecting to secure PayPal gateway...</div>
            <button type="submit" class="premium-button w-full py-4 rounded-xl">Pay with PayPal</button>
        </form>
    </div>
</div>

<div id="auth-modal" class="modal-overlay">
    <div class="bg-zinc-900 p-8 rounded-2xl border border-yellow-600 text-center max-w-sm w-full">
        <h2 class="text-2xl font-bold gold-gradient-text mb-6 royal-font">Join the Archive</h2>
        <button onclick="handleLogin()" class="w-full bg-white text-black font-bold py-3 rounded-lg mb-4 flex items-center justify-center gap-2">
            <i class="fab fa-google"></i> Continue with Google
        </button>
        <button onclick="closeModals()" class="text-gray-500">Cancel</button>
    </div>
</div>

<button id="currency-btn" onclick="toggleCurrency()" class="fixed bottom-6 left-6 premium-button p-4 rounded-full shadow-2xl z-50">
    <i class="fas fa-coins mr-2"></i> <span id="current-currency">EGP</span>
</button>

<script>
    // --- SETTINGS ---
    const ROYAL_PASS = "KING2026";
    let currentCurrency = "EGP";
    const exchangeRates = { "USD": 0.020, "EUR": 0.019, "EGP": 1 };

    // --- DROP TIMER LOGIC ---
    function updateTimer() {
        const nextDrop = new Date("2026-12-31T23:59:59").getTime(); // Set your brother's next drop date
        const now = new Date().getTime();
        const diff = nextDrop - now;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById("drop-timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
    }
    setInterval(updateTimer, 1000);

    // --- CURRENCY LOGIC ---
    function toggleCurrency() {
        currentCurrency = currentCurrency === "EGP" ? "USD" : "EGP";
        document.getElementById("current-currency").innerText = currentCurrency;
        document.querySelectorAll(".price-tag").forEach(el => {
            const base = el.getAttribute("data-egp");
            el.innerText = currentCurrency + " " + (base * exchangeRates[currentCurrency]).toFixed(2);
        });
    }

    // --- AUTH LOGIC ---
    function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
    function handleLogin() {
        // Mock Login
        document.getElementById('user-avatar').style.display = 'flex';
        document.getElementById('user-avatar').innerText = "K";
        document.getElementById('sign-btn').style.display = 'none';
        closeModals();
    }

    // --- THEME LOGIC ---
    document.getElementById('theme-toggle').onclick = () => {
        document.body.classList.toggle('light-mode');
    };

    // --- MODAL CONTROLS ---
    function openBook(title, content) {
        document.getElementById('book-title').innerText = title;
        document.getElementById('book-content').innerText = content;
        document.getElementById('book-modal').style.display = 'flex';
    }
    function closeBook() { document.getElementById('book-modal').style.display = 'none'; }
    
    function openCheckout(name, price) {
        document.getElementById('checkout-item-name').innerText = name;
        document.getElementById('checkout-modal').style.display = 'flex';
    }
    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    }

    function processPayment(e) {
        e.preventDefault();
        window.open("https://paypal.me/YOUR_USER_NAME", "_blank"); // Replace with your brother's PayPal
        alert("Redirecting to PayPal. Once paid, the manuscript link will be sent to your email.");
    }

    // --- SECURITY ---
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p')) e.preventDefault();
    });
</script>

<footer class="bg-black py-12 border-t border-yellow-900 text-center">
    <div class="flex justify-center gap-6 mb-6 text-2xl text-yellow-500">
        <i class="fab fa-instagram"></i> <i class="fab fa-tiktok"></i> <i class="fab fa-facebook"></i>
    </div>
    <p class="royal-font gold-gradient-text text-xl">KING BOOKS &copy; 2026</p>
</footer>

</body>
</html>
